<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparkle Pass Checker ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Sparkle Guard</h1>
        <p class="subtitle">Let's check your password's magic!</p>
        
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Enter your password..." autocomplete="off">
            <span id="toggleVis" class="eye-icon">👁️</span>
        </div>

        <div class="meter-container">
            <div id="strengthBar" class="bar"></div>
        </div>

        <div id="feedback" class="feedback-text">Waiting for input...</div>

        <div class="stats">
            <div class="stat-item">Entropy: <span id="entropyVal">0</span> bits</div>
            <div id="patternWarning" class="warning-text"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
